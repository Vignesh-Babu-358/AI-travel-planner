server:
  # Render injects PORT at runtime; default 8080 keeps local dev unchanged.
  port: ${PORT:8080}

spring:
  application:
    name: travel-planner

  # Return RFC-7807 ProblemDetail JSON ({type,title,status,detail}) for
  # ResponseStatusException etc., so error messages reach the frontend.
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travel}
    username: ${DB_USERNAME:travel}
    password: ${DB_PASSWORD:travel}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # spring-boot-docker-compose auto-starts docker-compose.yml in local dev.
  # In hosted environments (Render etc.) Postgres is external — set
  # SPRING_DOCKER_COMPOSE_ENABLED=false to skip the local compose lookup.
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
      lifecycle-management: start-and-stop

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.7
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE

# Application-specific knobs
app:
  rag:
    top-k: 4
    similarity-threshold: 0.5
  routing:
    google:
      base-url: ${GOOGLE_MAPS_BASE_URL:https://maps.googleapis.com}
      api-key: ${GOOGLE_MAPS_API_KEY:}
      # Region biasing for routing/geocoding (ccTLD, e.g. 'in' for India).
      region: ${GOOGLE_MAPS_REGION:in}
      # Restrict geocoding to a specific country (ISO 3166-1 alpha-2, lowercase)
      # so place names don't match towns on other continents.
      country-bias: ${GOOGLE_MAPS_COUNTRY:in}
  seed-sample-trips: ${SEED_SAMPLE_TRIPS:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.ai: INFO
