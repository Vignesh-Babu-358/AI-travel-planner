spring:
  application:
    name: travel-planner

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travel}
    username: ${DB_USERNAME:travel}
    password: ${DB_PASSWORD:travel}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # spring-boot-docker-compose auto-starts docker-compose.yml when Docker is available.
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.7
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE

# Application-specific knobs
app:
  rag:
    top-k: 4
    similarity-threshold: 0.5
  seed-sample-trips: ${SEED_SAMPLE_TRIPS:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.ai: INFO
